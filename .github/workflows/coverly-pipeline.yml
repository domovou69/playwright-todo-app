name: Coverly Pipeline

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  pull-requests: write

env:
  COREPACK_ENABLE_STRICT: '0'

jobs:
  coverly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Checkout coverly privately, then reference as local action 
      - uses: actions/checkout@v4
        with:
          repository: domovou69/coverly
          token: ${{ secrets.COVERLY_TOKEN }}
          path: .coverly

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install app dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npx playwright test --reporter=json 2>/dev/null | tee playwright-report.json
        continue-on-error: true

      # Run coverly as a local action — no "not found" error since it's already on disk
      - uses: ./.coverly
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
