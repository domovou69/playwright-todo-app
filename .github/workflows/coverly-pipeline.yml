# Coverly CI Pipeline
#
# Copy this file to .github/workflows/coverly.yml in your app repo.
#
# What it does on every PR:
#   1. Extracts React app structure  → app-manifest.json
#   2. Extracts test structure       → test-manifest.json
#   3. Diffs app vs tests            → diff-report.json
#   4. Creates a versioned snapshot  → graph/snapshots/build-<id>/
#   5. Runs Playwright tests         → playwright-report.json
#   6. Analyses failures             → report-analysis.json
#   7. Rebuilds SQLite index         → graph/graph.db
#   8. Posts a summary comment on PR
#   9. Commits builds.json back to the repo (on main only)
#
# Required secrets (Settings → Secrets → Actions):
#   - COVERLY_REPO:  GitHub repo path for coverly, e.g. "your-org/coverly"
#   - COVERLY_TOKEN: PAT with repo read access to coverly (or remove if public)
#
# The GITHUB_TOKEN secret is provided automatically by GitHub Actions.

name: Coverly Pipeline

on:
  pull_request:

permissions:
  contents: write      # needed to commit builds.json back
  pull-requests: write # needed to post PR comments

env:
  # Allow pnpm (used by .coverly) to run even though this app declares
  # "packageManager": "yarn" in its package.json. Without this, corepack
  # would block pnpm when it walks up from .coverly/ to the workspace root.
  COREPACK_ENABLE_STRICT: '0'

jobs:
  coverly:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the consumer app
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Checkout Coverly as a sibling tool
      - name: Checkout Coverly
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.COVERLY_REPO }}
          token: ${{ secrets.COVERLY_TOKEN || github.token }}
          path: .coverly

      # 3. Setup pnpm (for Coverly), then Node
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 4. Install dependencies
      - name: Install app dependencies
        run: |
          if   [ -f yarn.lock        ]; then yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then npm ci
          elif [ -f pnpm-lock.yaml   ]; then pnpm install --frozen-lockfile
          fi

      - name: Install Coverly dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .coverly

      # 5. Restore graph history from cache (enables cross-build flaky detection)
      - name: Restore graph cache
        uses: actions/cache@v4
        with:
          path: .coverly/graph
          key: coverly-graph-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            coverly-graph-${{ github.ref_name }}-
            coverly-graph-main-

      # 6. Extract app + test structure
      - name: Extract React app
        run: pnpm extract ..
        working-directory: .coverly

      - name: Extract test structure
        run: pnpm extract:tests ..
        working-directory: .coverly

      # 7. Diff and snapshot
      - name: Generate coverage diff
        run: pnpm diff
        working-directory: .coverly

      - name: Create build snapshot
        run: pnpm snapshot ${{ github.base_ref == 'main' && 'staging' || 'dev' }} ${{ github.sha }}
        working-directory: .coverly

      # 8. Run Playwright tests (continue even if tests fail so we still get the report)
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --reporter=json --output=test-results 2>/dev/null | tee playwright-report.json || true

      # 9. Analyse report + rebuild index
      - name: Analyse test report
        run: |
          BUILD_ID=$(cat graph/.last-build-id)
          pnpm report ../playwright-report.json "$BUILD_ID"
        working-directory: .coverly

      - name: Rebuild SQLite index
        run: pnpm index
        working-directory: .coverly

      # 10. Post PR comment
      - name: Post PR comment
        run: |
          BUILD_ID=$(cat graph/.last-build-id)
          pnpm comment "$BUILD_ID"
        working-directory: .coverly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      # 11. Commit builds.json back to repo on main (so history persists across runs)
      - name: Commit builds.json
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "coverly-bot"
          git config user.email "coverly-bot@users.noreply.github.com"
          git add .coverly/graph/builds.json
          git diff --staged --quiet || git commit -m "chore: coverly build history [skip ci]"
          git push
